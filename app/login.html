<!DOCTYPE html>
<html lang="es">
<head>
    <base href="/app/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Soy Nexo</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css"> <!-- Reusar variables base -->
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-glow);
            text-align: center;
        }
        .auth-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .logo-icon { font-size: 1.8rem; }
        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .auth-form {
            text-align: left;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }
        .auth-tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
        }
        .google-btn {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .google-btn:hover { background: #f8f9fa; color: #333; }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="../index.html" class="auth-logo">
            <span class="logo-icon">⬡</span>
            SOY NEXO
        </a>
        
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login">Iniciar Sesión</div>
            <div class="auth-tab" id="tab-register">Crear Cuenta</div>
        </div>

        <h1 class="auth-title" id="auth-title">Bienvenido de vuelta</h1>
        <p class="auth-subtitle" id="auth-subtitle">Ingresa a tu panel de control masivo</p>

        <!-- Botón Google -->
        <button class="btn btn-ghost google-btn" id="btn-google">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.9c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
            Continuar con Google
        </button>

        <div class="divider">O usa tu email</div>

        <form class="auth-form" id="auth-form">
            <div class="form-group" id="group-name" style="display: none;">
                <label>Nombre Completo</label>
                <input type="text" id="input-name" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="input-email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="input-password" required placeholder="••••••••">
            </div>
            
            <p class="error-message" id="error-msg">Credenciales incorrectas.</p>

            <button type="submit" class="btn btn-primary auth-btn" id="btn-submit">Ingresar al Panel</button>
        </form>
    </div>

    <!-- Firebase SDKs (Compat version for Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="login.js"></script>
</body>
</html>
